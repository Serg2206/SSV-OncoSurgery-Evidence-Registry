version: "3.9"

services:
  evidence-api:
    image: ghcr.io/serg2206/ssv-oncosurgery-evidence-registry:latest
    container_name: ssv-evidence-api-prod
    ports:
      - "8000:8000"
    environment:
      - TZ=UTC
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"
      - --proxy-headers
      - --forwarded-allow-ips=*
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
