name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-registry-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate CSV templates exist
        run: |
          test -f data_dictionary_template.csv
          test -f patient_outcomes_template.csv

      - name: Basic CSV shape checks
        run: |
          python - << 'PY'
          import csv

          required_data_dict_cols = {
              "field_name","domain","data_type","allowed_values","required",
              "description","clinical_rationale","source_system","unit","example"
          }
          with open('data_dictionary_template.csv', newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              cols = set(reader.fieldnames or [])
              missing = required_data_dict_cols - cols
              if missing:
                  raise SystemExit(f"Missing columns in data_dictionary_template.csv: {sorted(missing)}")

          with open('patient_outcomes_template.csv', newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              rows = list(reader)
              if len(rows) < 1:
                  raise SystemExit('patient_outcomes_template.csv must contain at least one sample row')

          print('CSV templates validated successfully')
          PY

      - name: Regenerate partner OpenAPI spec
        run: |
          python scripts/export_openapi.py --output docs/openapi.partner.yaml

      - name: Ensure OpenAPI spec is up to date
        run: |
          git diff --exit-code docs/openapi.partner.yaml

      - name: Verify v1 backward-compatible contracts
        run: |
          python scripts/verify_v1_contracts.py

      - name: Smoke-test key API endpoints
        run: |
          python scripts/smoke_test_api.py
